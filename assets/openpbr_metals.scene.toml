# OpenPBR Metals Showcase — Hyperion demo
# 20 metal spheres in 4 rows × 5, lit by IBL panorama.
# Spacing 2.5 (radius 0.70, gap 1.10) ensures inter-sphere reflections are visible.
# Materials from openpbr_metals.materials.toml (F0/F82 conductor model).

material_libraries = ["openpbr_metals.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_64spp_6bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 3.0, -12.0]
rotate_x = -10.8501
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [12.0, 0.1, 12.0]

[[mesh]]
name = "sphere"
type = "sphere"
radius = 0.7

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.05, 0.0]

# ── Row 0  z = -3.75 ──────────────────────────────────────────────────────────
[[instance]]
mesh = "sphere"
material = "Copper"
translate = [-5.0, 0.7, -3.75]

[[instance]]
mesh = "sphere"
material = "Gold"
translate = [-2.5, 0.7, -3.75]

[[instance]]
mesh = "sphere"
material = "Silver"
translate = [0.0, 0.7, -3.75]

[[instance]]
mesh = "sphere"
material = "Platinum"
translate = [2.5, 0.7, -3.75]

[[instance]]
mesh = "sphere"
material = "Iridium"
translate = [5.0, 0.7, -3.75]

# ── Row 1  z = -1.25 ──────────────────────────────────────────────────────────
