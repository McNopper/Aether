# Fixture: Transparency Plane Direct-Light Coverage
#
# PURPOSE
# -------
# Coverage test under direct lighting only (no IBL). Uses the same transparent
# plane + rear sphere layout as the base plane fixture, with a small emissive
# point-light sphere above it.

material_libraries = [
    "fixture_transparency_plane.materials.toml",
    "fixture_point_light.materials.toml",
]

[render]
reference = "presets/comparison_direct_512spp.render.toml"

[camera]
reference = "presets/fixture_ibl.camera.toml"
translate = [0.0, 1.0, -3.2]
rotate_x = -7.1250
rotate_y = 180.0000

[tonemap]
tonemapper = "agx"

[[geometry]]
type = "sphere"
radius = 0.5
material = "MatteRed"
translate = [0.0, 0.6, 0.4]

[[geometry]]
type = "instance"
mesh = "quad.obj"
scale = [1.2, 1.0, 1.2]
rotate = [0.7071, 0.0, 0.0, 0.7071]
material = "CoveragePlane"
translate = [0.0, 0.6, -0.25]

[[geometry]]
type = "instance"
mesh = "sphere.obj"
scale = [0.05, 0.05, 0.05]
material = "PointLight"
translate = [0.0, 2.5, 0.0]
