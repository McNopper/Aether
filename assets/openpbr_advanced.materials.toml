# OpenPBR advanced-transmission / subsurface showcase — Hyperion demo
# 
# Demonstrates OpenPBR parameters that were previously inert and are now wired
# end-to-end through the path tracer:
# • transmission_scatter (+ transmission_scatter_anisotropy)
# • transmission_dispersion_scale (+ transmission_dispersion_abbe_number)
# • geometry_thin_walled  (dielectric thin sheet + thin subsurface sheet)
# • subsurface_scatter_anisotropy
# 
# Color values are linear Rec.709; Hyperion converts to linear Rec.2020 on load.

model = "openpbr"
colorspace = "lin_rec709_scene"

# ── Volumetric single-scatter (milky / cloudy liquid) ─────────────────────────
# transmission_scatter tints/attenuates the transmitted radiance; the anisotropy
# g < 0 (back-scatter) makes the medium appear milkier.

[MilkyScatter]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
transmission_color = [0.95, 0.97, 1.00]
transmission_depth = 0.6
transmission_scatter = [0.55, 0.70, 0.85]
transmission_scatter_anisotropy = -0.4
specular_ior = 1.33
specular_roughness = 0.0

# ── Forward-scattering tinted glass (clearer, warm) ───────────────────────────

[HoneyScatter]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
transmission_color = [0.85, 0.55, 0.18]
transmission_depth = 0.4
transmission_scatter = [0.80, 0.55, 0.20]
transmission_scatter_anisotropy = 0.6
specular_ior = 1.49
specular_roughness = 0.0

# ── Dispersive gemstone (chromatic "fire") ────────────────────────────────────
# Low Abbe number + non-zero dispersion_scale spreads the per-channel IOR.

[DispersiveDiamond]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
specular_ior = 2.42
specular_roughness = 0.0
transmission_dispersion_scale = 1.0
transmission_dispersion_abbe_number = 12.0

# ── Thin-walled dielectric sheet (single-surface glass, no refractive bend) ────

[ThinGlassSheet]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
specular_ior = 1.50
specular_roughness = 0.0
geometry_thin_walled = true

# ── Thin-walled translucent leaf (diffuse transmission via subsurface) ────────

[TranslucentLeaf]
base_color = [0.10, 0.35, 0.08]
subsurface_weight = 1.0
subsurface_color = [0.35, 0.70, 0.20]
geometry_thin_walled = true
subsurface_scatter_anisotropy = 0.5
specular_roughness = 0.4

# ── Forward-scattering subsurface solid (waxy / skin-like) ────────────────────

[WaxySubsurface]
base_color = [0.95, 0.85, 0.78]
subsurface_weight = 1.0
subsurface_color = [0.92, 0.55, 0.45]
subsurface_radius_scale = [1.2, 0.45, 0.30]
subsurface_scatter_anisotropy = 0.7
specular_roughness = 0.35
specular_ior = 1.40
