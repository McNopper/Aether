# Hyperion – Meadow IBL Showcase Scene
# Illuminated by meadow_2_4k.exr (equirectangular HDR panorama, linear Rec.2020 after load).
# Seven spheres showcase the full OpenPBR material range.

material_libraries = ["meadow_materials.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_16spp_10bounce.render.toml"

[camera]
reference = "presets/meadow.camera.toml"

[tonemap]
reference = "presets/agx.tonemap.toml"

# Ground plane — large enough to fill the IBL horizon
[[geometry]]
type = "box"
half_extents = [30.0, 0.1, 30.0]
material = "NeutralFloor"
translate = [0.0, -0.1, 8.0]

# Diffuse white
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_diffuse_white"
translate = [-4.5, 0.75, 0.0]

# Rough metal (gold)
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_metal_gold"
translate = [-1.5, 0.75, 0.0]

# Smooth metal (mirror)
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_mirror"
translate = [1.5, 0.75, 0.0]

# Clear glass
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_glass"
translate = [4.5, 0.75, 0.0]

# Rough dielectric (frosted)
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_frosted_glass"
translate = [-3.0, 0.75, 3.0]

# Coated diffuse (varnished wood)
[[geometry]]
type = "sphere"
radius = 0.75
material = "mat_coated_diffuse"
translate = [0.0, 0.75, 3.0]
