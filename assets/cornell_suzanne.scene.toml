# Cornell Box — Suzanne
# Suzanne monkey head with a companion glass sphere.
# 
# Syntax reference: see SceneParser.hpp
# 
# Quaternion for 180° around Y  →  0  1  0  0

material_libraries = ["cornell.materials.toml", "suzanne.materials.toml"]

[render]
reference = "presets/preview.render.toml"

[camera]
reference = "presets/cornell.camera.toml"
translate = [0.0, 2.73, -8.0]
rotate_x = 0.0000
rotate_y = 180.0000

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "cornell"
path = "cornell.obj"

[[mesh]]
name = "suzanne"
path = "suzanne.obj"

[[mesh]]
name = "sphere"
type = "sphere"
radius = 0.6

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "cornell"
# rotate_y = 180 compensates for the 180° Y bake baked into cornell.obj
materials = { "Floor" = "WhiteWall", "Ceiling" = "WhiteWall", "AreaLight" = "AreaLight", "BackWall" = "WhiteWall", "LeftWall" = "RedWall", "RightWall" = "GreenWall" }
rotate_y = 180.0

# Suzanne spans ±1.3 Blender units; scale=1.0 keeps it ±1.3 world units.
# Rotated 180° around Y so the face points toward the camera.
[[instance]]
mesh = "suzanne"
material = "SuzanneDefault"
translate = [0.0, 2.5, 2.8]
rotate = [0.0, 1.0, 0.0, 0.0]
scale = 1.0

# Companion glass sphere
[[instance]]
mesh = "sphere"
material = "Glass"
translate = [1.52, 0.6, 2.0]
