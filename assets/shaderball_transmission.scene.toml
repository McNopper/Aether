# shaderball_transmission.scene — OpenPBR transmission (refraction) layer showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests transmission_weight (row 0) and named optical substances / specular_ior
# (row 1). Materials from shaderball_transmission.materials.toml.

material_libraries = ["shaderball_transmission.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_16bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane
[[geometry]]
type = "box"
half_extents = [14.0, 0.1, 10.0]
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  transmission_weight sweep ────────────────────────────────
[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "TransWeight_100", BallInner = "NeutralBall", BallSurface = "TransWeight_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "TransWeight_075", BallInner = "NeutralBall", BallSurface = "TransWeight_075" }
