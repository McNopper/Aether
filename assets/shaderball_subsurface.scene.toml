# shaderball_subsurface.scene — OpenPBR subsurface scattering layer showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests subsurface_weight (row 0) and named organic materials (row 1).
# Materials from shaderball_subsurface.materials.toml.

material_libraries = ["shaderball_subsurface.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_64spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [14.0, 0.1, 10.0]

[[mesh]]
name = "shader_ball"
path = "shader_ball.obj"

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  subsurface_weight sweep ──────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SssWeight_100", "BallInner" = "NeutralBall", "BallSurface" = "SssWeight_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SssWeight_075", "BallInner" = "NeutralBall", "BallSurface" = "SssWeight_075" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
