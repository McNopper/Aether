translate = [5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SssWeight_000", "BallInner" = "NeutralBall", "BallSurface" = "SssWeight_000" }
translate = [10.0, -0.021, 0.095]
rotate_y = 180.0

