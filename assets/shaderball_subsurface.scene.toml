materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SssWeight_050", "BallInner" = "NeutralBall", "BallSurface" = "SssWeight_050" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
