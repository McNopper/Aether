# Fixture: Transparency Plane Sweep
#
# PURPOSE
# -------
# Minimal transparency debug fixture: a single rectangular transparent plane in
# front of one opaque red sphere. This reduces geometry interactions versus the
# sphere/sphere fixture and is used for opacity progression checks first.
#
# "Over time" is evaluated as a scripted static sweep of opacity values on the
# same scene/material file (no animation schema changes).

material_libraries = ["fixture_transparency_plane.materials.toml"]

[render]
reference = "presets/comparison_ibl_512spp.render.toml"

[camera]
reference = "presets/fixture_ibl.camera.toml"

[tonemap]
tonemapper = "agx"

# Opaque reference behind the transparent plane.
[[geometry]]
type = "sphere"
radius = 0.5
material = "MatteRed"
translate = [0.0, 0.6, 0.4]

# Rectangular transparent plane in front of the red sphere.
# quad.obj default orientation is horizontal (normal along -Y in current assets);
# rotate +90deg around X so the plane faces the camera (-Z normal).
[[geometry]]
type = "instance"
mesh = "quad.obj"
scale = [1.2, 1.0, 1.2]
rotate = [0.7071, 0.0, 0.0, 0.7071]
material = "CoveragePlane"
translate = [0.0, 0.6, -0.25]
