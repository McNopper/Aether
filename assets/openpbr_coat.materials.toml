specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.80
coat_ior = 1.50
coat_darkening = 1.0

# ── Row 2: coat_darkening + real-world lacquered materials ─────────────────────────────────────
# coat_darkening [0,1]: 1.0 = full energy-conservation darkening at the base/coat interface
# (OpenPBR spec §5.4 "coat_darkening"); 0.0 = base colour unchanged by the coat.

[CarLacquer]
base_color = [0.600, 0.050, 0.020]
specular_roughness = 0.60
coat_weight = 1.0
coat_roughness = 0.02
coat_ior = 1.60
coat_darkening = 1.0

[Lacquer_DarkNone]
