# OpenPBR coat layer material library — Hyperion demo
# 
# Systematically exercises coat_weight, coat_roughness, coat_ior, coat_darkening
# and the interaction of the coat lobe with diffuse and metallic bases.
# Source values from OpenPBR Surface v1.1 specification §5.4 (coat lobe).
# Color values are linear Rec.709; Hyperion converts to linear Rec.2020 on load.
# 
# Standard MTL keywords (Kd, Ks, Ka, …) are SILENTLY IGNORED.

colorspace = "lin_rec709"

# ── Row 0: coat_weight sweep — diffuse blue base, coat_ior 1.5, coat_roughness 0.05 ──────────
# Shows how adding a coat layer progressively introduces a dielectric specular highlight
# while coat_darkening reduces the base layer brightness.

[CoatWeight_0]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 0.0

[CoatWeight_25]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 0.25
coat_roughness = 0.05
coat_ior = 1.50
coat_darkening = 1.0

[CoatWeight_50]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 0.50
coat_roughness = 0.05
coat_ior = 1.50
coat_darkening = 1.0

[CoatWeight_75]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 0.75
coat_roughness = 0.05
coat_ior = 1.50
coat_darkening = 1.0

[CoatWeight_100]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.05
coat_ior = 1.50
coat_darkening = 1.0

# ── Row 1: coat_roughness sweep — fully coated blue base, coat_weight 1.0 ─────────────────────
# Mirror coat (0.0) → glossy satin coat (0.5) → matte coat (0.9).
# coat_darkening = 1.0 throughout so base brightness is reduced consistently.

[CoatRough_0]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.00
coat_ior = 1.50
coat_darkening = 1.0

[CoatRough_15]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.15
coat_ior = 1.50
coat_darkening = 1.0

[CoatRough_30]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.30
coat_ior = 1.50
coat_darkening = 1.0

[CoatRough_50]
base_color = [0.050, 0.200, 0.700]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.50
coat_ior = 1.50
coat_darkening = 1.0

[CoatRough_80]
