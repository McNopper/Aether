# Cornell Box — Classic, rendered in a linear Rec.709 working color space.
# Identical to cornell_classic.scene.toml except for working_color_space; the
# gamut-limited Cornell content must render ≈ identical to the Rec.2020 version
# (color management validation scene).
#
# Syntax reference: see SceneLoader.hpp

material_libraries = ["cornell.materials.toml"]

[render]
reference = "presets/preview.render.toml"
working_color_space = "lin_rec709_scene"

[camera]
reference = "presets/cornell.camera.toml"
translate = [2.78, 2.73, -8.0]
rotate_x = 0.0000
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "cornell.obj"
materials = { Floor = "WhiteWall", Ceiling = "WhiteWall", AreaLight = "AreaLight", BackWall = "WhiteWall", LeftWall = "RedWall", RightWall = "GreenWall" }

# Short box  (82.5 × 82.5 × 82.5,  rotated −18° around Y)
[[geometry]]
type = "box"
half_extents = [0.825, 0.825, 0.825]
material = "WhiteWall"
translate = [1.85, 0.825, 1.69]
rotate = [0.0, -0.1564, 0.0, 0.9877]

# Tall box  (82.5 × 165.0 × 82.5,  rotated +15° around Y)
[[geometry]]
type = "box"
half_extents = [0.825, 1.65, 0.825]
material = "WhiteWall"
translate = [3.68, 1.65, 3.51]
rotate = [0.0, 0.1305, 0.0, 0.9914]
