# Fixture: Rect Light
#
# PURPOSE
# -------
# Isolates rect (area) light evaluation.  Single emissive ceiling panel + matte
# receiver sphere.  No IBL.  Compare Hyperion NEE vs Theia LTC.
#
# LAYOUT (unit-scale, metres)
#   - Floor          box  [0, 0, 0]  half [3, 0.05, 3]
#   - Receiver       sphere r=0.5    [0, 0.5, 0]
#   - Rect light     quad [0, 3, 0]  scale [1.2, 1, 1.2]  emissive

material_libraries = ["fixture_rect_light.materials.toml"]

[render]
reference = "presets/comparison_direct_512spp.render.toml"

[camera]
reference = "presets/fixture.camera.toml"
translate = [0.0, 1.5, -4.0]
rotate_x = -14.0362
rotate_y = 180.0000

[tonemap]
tonemapper = "agx"

# ── Floor ──────────────────────────────────────────────────────────────────────
[[geometry]]
type = "box"
half_extents = [3.0, 0.05, 3.0]
material = "Floor"
translate = [0.0, 0.0, 0.0]

# ── Receiver sphere ───────────────────────────────────────────────────────────
[[geometry]]
type = "sphere"
radius = 0.5
material = "Matte"
translate = [0.0, 0.5, 0.0]

# ── Rect light (ceiling panel — flat quad, -Y normal) ─────────────────────────
[[geometry]]
type = "instance"
mesh = "quad.obj"
scale = [1.2, 1.0, 1.2]
material = "RectLight"
translate = [0.0, 3.0, 0.0]
