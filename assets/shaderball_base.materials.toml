# OpenPBR base/diffuse layer material library — shader_ball demo
#
# Systematically exercises base_diffuse_roughness (Oren-Nayar diffuse roughness) —
# the base/diffuse lobe's only shape parameter. 0.0 = pure Lambertian; 1.0 = fully
# rough, chalky reflectance falloff at grazing angles.
# Source: OpenPBR Surface v1.1 specification §5.1 (base/diffuse lobe).
# Color values are linear Rec.709; Hyperion/Theia convert to linear Rec.2020 on load.
#
# Standard MTL keywords (Kd, Ks, Ka, …) are SILENTLY IGNORED.

model = "openpbr"
colorspace = "lin_rec709_scene"

# ── Neutral zones (shared by every shader_ball instance in the grid) ─────────

[NeutralBall]
base_color = [0.600, 0.600, 0.600]
specular_roughness = 0.60

[NeutralTop]
base_color = [0.520, 0.520, 0.520]
specular_roughness = 0.60

[NeutralStem]
base_color = [0.440, 0.440, 0.450]
specular_roughness = 0.60

# ── Row 0: base_diffuse_roughness sweep — warm neutral grey ──────────────────

[BaseRough_000]
base_color = [0.600, 0.550, 0.500]
specular_roughness = 0.80
base_diffuse_roughness = 0.00

[BaseRough_025]
base_color = [0.600, 0.550, 0.500]
specular_roughness = 0.80
base_diffuse_roughness = 0.25

[BaseRough_050]
base_color = [0.600, 0.550, 0.500]
specular_roughness = 0.80
base_diffuse_roughness = 0.50

[BaseRough_075]
base_color = [0.600, 0.550, 0.500]
specular_roughness = 0.80
base_diffuse_roughness = 0.75

[BaseRough_100]
base_color = [0.600, 0.550, 0.500]
specular_roughness = 0.80
base_diffuse_roughness = 1.00
