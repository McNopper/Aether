# OpenPBR Special Materials Showcase — Hyperion demo
# Carpaint, soap bubble, rubber, charcoal, concrete, sand — 6 spheres.
# Materials from openpbr_special.materials.toml.

material_libraries = ["openpbr_special.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_12bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_near.camera.toml"

# Ground plane
[[geometry]]
type = "box"
half_extents = [10.0, 0.1, 8.0]
material = "NeutralFloor"
translate = [0.0, -0.05, 0.0]

# ── Row 0  z = -1.0 ───────────────────────────────────────────────────────────
[[geometry]]
type = "sphere"
radius = 0.70
material = "Carpaint"
translate = [-2.5, 0.70, -1.0]

[[geometry]]
type = "sphere"
radius = 0.70
material = "SoapBubble"
translate = [0.0, 0.70, -1.0]

[[geometry]]
type = "sphere"
radius = 0.70
material = "Sand"
translate = [2.5, 0.70, -1.0]

# ── Row 1  z = +1.5 ───────────────────────────────────────────────────────────
[[geometry]]
type = "sphere"
radius = 0.70
material = "Tire"
translate = [-2.5, 0.70, 1.5]

[[geometry]]
type = "sphere"
radius = 0.70
material = "Charcoal"
translate = [0.0, 0.70, 1.5]

[[geometry]]
type = "sphere"
radius = 0.70
material = "Concrete"
translate = [2.5, 0.70, 1.5]
