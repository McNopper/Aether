# shader_ball.scene — ShaderBall as a single-material preview with 5 independently
# assignable zones. Replace a zone's material name to preview a different material.
#
# Zone layout (assign via the 'materials' map below):
#   BaseFoot     — wide flat outer disc / outer rim   ← hero material (with BallSurface)
#   BaseStem     — central stem / riser               (neutral)
#   BaseTop      — inner collar plate at the base      (neutral)
#   BallInner    — inner cut of the main ball          (neutral)
#   BallSurface  — main ball surface + rim             ← primary hero zone
#
# Standard convention: the hero material is shown on BallSurface + BaseFoot; the
# other zones are neutral so they don't compete with it.
#
# Raw OBJ bounds: x ∈ [-13.46, 13.46]  y ∈ [0.21, 26.78]  z ∈ [-13.46, 11.55]
# At scale 0.1: ~2.7 units tall, seated at y ≈ 0.
# translate centres z (raw centre z = -0.951, scaled = -0.095).

material_libraries = ["shader_ball.materials.toml"]

[render]
reference = "presets/relax_256spp_16bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_near.camera.toml"
translate = [0.0, 2.0, -8.0]
rotate_x = -9.2299
rotate_y = 180.0000

[tonemap]
reference = "presets/aces.tonemap.toml"

# Studio pedestal — flush with y = 0.

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [6.0, 0.1, 6.0]

[[mesh]]
name = "shader_ball"
path = "shader_ball.obj"

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "BaseTop"
translate = [0.0, -0.1, 0.0]

# ShaderBall — scaled to ~2.7 units tall, centred, seated on floor.
# y_min (raw) = 0.206 → at scale 0.1: 0.021 above floor → subtract to seat exactly.
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "BaseTop", "BaseStem" = "BaseStem", "BaseFoot" = "BaseFoot", "BallInner" = "BallInner", "BallSurface" = "BallSurface" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0
