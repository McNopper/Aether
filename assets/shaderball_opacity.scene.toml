# shaderball_opacity.scene — OpenPBR geometry/opacity layer showcase.
# 5 shader_ball instances in a single row, lit by the meadow IBL panorama.
# Tests geometry_opacity (stochastic coverage), independent of transmission.
# Materials from shaderball_opacity.materials.toml.

material_libraries = ["shaderball_opacity.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane
[[geometry]]
type = "box"
half_extents = [14.0, 0.1, 10.0]
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  geometry_opacity sweep ───────────────────────────────────
[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "Opacity_100", BallInner = "NeutralBall", BallSurface = "Opacity_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "Opacity_075", BallInner = "NeutralBall", BallSurface = "Opacity_075" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "Opacity_050", BallInner = "NeutralBall", BallSurface = "Opacity_050" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "Opacity_025", BallInner = "NeutralBall", BallSurface = "Opacity_025" }
translate = [5.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "Opacity_000", BallInner = "NeutralBall", BallSurface = "Opacity_000" }
translate = [10.0, -0.021, 0.095]
rotate_y = 180.0000
