material_libraries = ["furnace.materials.toml"]

[render]
reference = "presets/preview.render.toml"
working_color_space = "lin_rec2020_scene"

[camera]
reference = "presets/cornell.camera.toml"
translate = [278.0, 273.0, -800.0]
rotate_x = 0.0000
rotate_y = 180.0000

[tonemap]
tonemapper = "agx"

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "sphere"
type = "sphere"
radius = 0.3

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "sphere"
materials = { "Material" = "WhiteCoverage" }
translate = [0.0, 0.0, 0.0]
