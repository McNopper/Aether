# OpenPBR geometry/opacity layer material library — shader_ball demo
#
# Systematically exercises geometry_opacity — a stochastic pass-through delta
# BTDF gating coverage/alpha, independent of transmission_weight (OpenPBR
# Surface v1.1 specification §4, geometry inputs).
# Color values are linear Rec.709; Hyperion/Theia convert to linear Rec.2020 on load.
#
# Standard MTL keywords (Kd, Ks, Ka, …) are SILENTLY IGNORED.

model = "openpbr"
colorspace = "lin_rec709_scene"

# ── Neutral zones (shared by every shader_ball instance in the grid) ─────────

[NeutralBall]
base_color = [0.600, 0.600, 0.600]
specular_roughness = 0.60

[NeutralTop]
base_color = [0.520, 0.520, 0.520]
specular_roughness = 0.60

[NeutralStem]
base_color = [0.440, 0.440, 0.450]
specular_roughness = 0.60

# ── Row 0: geometry_opacity sweep — matte red base ───────────────────────────
# opacity 0 → fully invisible (pass-through); 1 → fully opaque.

[Opacity_000]
base_color = [0.600, 0.100, 0.100]
specular_roughness = 0.30
geometry_opacity = 0.00

[Opacity_025]
base_color = [0.600, 0.100, 0.100]
specular_roughness = 0.30
geometry_opacity = 0.25

[Opacity_050]
base_color = [0.600, 0.100, 0.100]
specular_roughness = 0.30
geometry_opacity = 0.50

[Opacity_075]
base_color = [0.600, 0.100, 0.100]
specular_roughness = 0.30
geometry_opacity = 0.75

[Opacity_100]
base_color = [0.600, 0.100, 0.100]
specular_roughness = 0.30
geometry_opacity = 1.00
