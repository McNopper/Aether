# shaderball_fuzz.scene — OpenPBR fuzz/sheen layer showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests fuzz_weight (row 0) and fuzz_roughness (row 1).
# Materials from shaderball_fuzz.materials.toml.

material_libraries = ["shaderball_fuzz.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_64spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [14.0, 0.1, 10.0]

[[mesh]]
name = "shader_ball"
path = "shader_ball.obj"

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  fuzz_weight sweep ────────────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzWeight_100", "BallInner" = "NeutralBall", "BallSurface" = "FuzzWeight_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzWeight_70", "BallInner" = "NeutralBall", "BallSurface" = "FuzzWeight_70" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzWeight_40", "BallInner" = "NeutralBall", "BallSurface" = "FuzzWeight_40" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzWeight_20", "BallInner" = "NeutralBall", "BallSurface" = "FuzzWeight_20" }
translate = [5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzWeight_0", "BallInner" = "NeutralBall", "BallSurface" = "FuzzWeight_0" }
translate = [10.0, -0.021, 0.095]
rotate_y = 180.0

# ── Row 1  z = 5.0  fuzz_roughness sweep ─────────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzRough_100", "BallInner" = "NeutralBall", "BallSurface" = "FuzzRough_100" }
translate = [-10.0, -0.021, 5.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "FuzzRough_75", "BallInner" = "NeutralBall", "BallSurface" = "FuzzRough_75" }
