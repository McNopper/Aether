# shaderball_fuzz.scene — OpenPBR fuzz/sheen layer showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests fuzz_weight (row 0) and fuzz_roughness (row 1).
# Materials from shaderball_fuzz.materials.toml.

material_libraries = ["shaderball_fuzz.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_64spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane
[[geometry]]
type = "box"
half_extents = [14.0, 0.1, 10.0]
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  fuzz_weight sweep ────────────────────────────────────────
[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "FuzzWeight_100", BallInner = "NeutralBall", BallSurface = "FuzzWeight_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "FuzzWeight_70", BallInner = "NeutralBall", BallSurface = "FuzzWeight_70" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
