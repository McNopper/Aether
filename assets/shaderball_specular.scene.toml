# shaderball_specular.scene — OpenPBR specular lobe showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests specular_roughness (row 0) and specular_ior (row 1).
# Materials from shaderball_specular.materials.toml.

material_libraries = ["shaderball_specular.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [14.0, 0.1, 10.0]

[[mesh]]
name = "shader_ball"
path = "shader_ball.obj"

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  specular_roughness sweep ─────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecRough_100", "BallInner" = "NeutralBall", "BallSurface" = "SpecRough_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecRough_050", "BallInner" = "NeutralBall", "BallSurface" = "SpecRough_050" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecRough_025", "BallInner" = "NeutralBall", "BallSurface" = "SpecRough_025" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecRough_010", "BallInner" = "NeutralBall", "BallSurface" = "SpecRough_010" }
translate = [5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecRough_000", "BallInner" = "NeutralBall", "BallSurface" = "SpecRough_000" }
translate = [10.0, -0.021, 0.095]
rotate_y = 180.0

# ── Row 1  z = 5.0  specular_ior sweep ───────────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "SpecIOR_2_5", "BallInner" = "NeutralBall", "BallSurface" = "SpecIOR_2_5" }
translate = [-10.0, -0.021, 5.095]
rotate_y = 180.0

[[instance]]
