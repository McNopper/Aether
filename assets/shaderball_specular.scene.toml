# shaderball_specular.scene — OpenPBR specular lobe showcase.
# 10 shader_ball instances in 2 rows x 5, lit by the meadow IBL panorama.
# Tests specular_roughness (row 0) and specular_ior (row 1).
# Materials from shaderball_specular.materials.toml.

material_libraries = ["shaderball_specular.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane
[[geometry]]
type = "box"
half_extents = [14.0, 0.1, 10.0]
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  specular_roughness sweep ─────────────────────────────────
[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "SpecRough_100", BallInner = "NeutralBall", BallSurface = "SpecRough_100" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "shader_ball.obj"
materials = { BaseTop = "NeutralTop", BaseStem = "NeutralStem", BaseFoot = "SpecRough_050", BallInner = "NeutralBall", BallSurface = "SpecRough_050" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0000

[[geometry]]
