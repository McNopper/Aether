# Material library for meadow_scene.scene.toml
#
# FORMAT NOTE
# -----------
# TOML OpenPBR material library: one table per material, keyed by name. All
# parameters use OpenPBR Surface v1.1 keyword names verbatim
# (https://academysoftwarefoundation.github.io/OpenPBR/). Any unrecognised
# keyword is silently ignored.
#
# Color values are linear Rec.709 by default; the consumer converts them to its
# working color space.

model = "openpbr"
colorspace = "lin_rec709_scene"

# ── Ground ────────────────────────────────────────────────────────────────────

[mat_ground]
base_color = [0.180, 0.260, 0.090]
base_diffuse_roughness = 0.80
specular_roughness = 0.95

# ── Diffuse white ─────────────────────────────────────────────────────────────

[mat_diffuse_white]
base_color = [0.900, 0.900, 0.900]
specular_roughness = 1.00

# ── Rough gold metal ──────────────────────────────────────────────────────────

[mat_metal_gold]
base_color = [1.000, 0.766, 0.336]
base_metalness = 1.0
specular_roughness = 0.35

# ── Mirror (smooth metal) ─────────────────────────────────────────────────────

[mat_mirror]
base_color = [0.950, 0.950, 0.950]
base_metalness = 1.0
specular_roughness = 0.00

# ── Clear glass ───────────────────────────────────────────────────────────────

[mat_glass]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
specular_ior = 1.50
specular_roughness = 0.00

# ── Frosted glass (rough dielectric) ─────────────────────────────────────────

[mat_frosted_glass]
base_color = [0.950, 0.950, 0.980]
transmission_weight = 1.0
specular_ior = 1.50
specular_roughness = 0.35

# ── Coated diffuse (varnished wood) ───────────────────────────────────────────

[mat_coated_diffuse]
base_color = [0.550, 0.300, 0.100]
specular_roughness = 0.80
coat_weight = 1.0
coat_roughness = 0.10
coat_ior = 1.50

# ── Emissive (small warm area light) ─────────────────────────────────────────

[mat_emissive]
base_color = [1.000, 0.875, 0.625]
emission_color = [1.000, 0.875, 0.625]
emission_luminance = 100000.0
