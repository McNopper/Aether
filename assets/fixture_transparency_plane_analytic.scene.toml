# Fixture: Transparency Plane Analytic Coverage
#
# PURPOSE
# -------
# Emission-only coverage check: no IBL, no direct lights, no BRDF dependence.
# The front transparent plane and the rear sphere are both self-emissive, so the
# transparent composite should reduce to a constant analytic blend on the plane.

material_libraries = ["fixture_transparency_plane_analytic.materials.toml"]

[render]
reference = "presets/comparison_64spp.render.toml"

[camera]
reference = "presets/fixture_ibl.camera.toml"

[tonemap]
tonemapper = "agx"

[[geometry]]
type = "sphere"
radius = 0.5
material = "EmissiveRed"
translate = [0.0, 0.6, 0.4]

[[geometry]]
type = "instance"
mesh = "quad.obj"
scale = [1.2, 1.0, 1.2]
rotate = [0.7071, 0.0, 0.0, 0.7071]
material = "CoveragePlane"
translate = [0.0, 0.6, -0.25]
