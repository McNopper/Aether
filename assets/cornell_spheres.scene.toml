# Cornell Box — Spheres
# Five spheres showcasing different OpenPBR materials.
# Layout: 3 spheres in the back row (z=3.5), 2 in the front row (z=1.6).
# Radius 0.7 gives 0.48-unit gaps within each row and 0.8-unit cross-row gaps,
# ensuring inter-sphere reflections are clearly visible.
# 
# Syntax reference: see SceneLoader.hpp

material_libraries = ["cornell.materials.toml"]

[render]
reference = "presets/preview.render.toml"

[camera]
reference = "presets/cornell.camera.toml"
translate = [0.0, 2.73, -8.0]
rotate_x = 0.0000
rotate_y = 180.0000

[[geometry]]
type = "instance"
mesh = "cornell.obj"
materials = { Floor = "WhiteWall", Ceiling = "WhiteWall", AreaLight = "AreaLight", BackWall = "WhiteWall", LeftWall = "RedWall", RightWall = "GreenWall" }
rotate_y = 180.0000  # compensates for the 180deg Y bake in cornell.obj

# ── Back row  z = 350 ─────────────────────────────────────────────────────────
[[geometry]]
type = "sphere"
radius = 0.7
material = "Mirror"
translate = [-1.88, 0.7, 3.5]

[[geometry]]
type = "sphere"
radius = 0.7
material = "Glass"
translate = [0.0, 0.7, 3.5]

[[geometry]]
type = "sphere"
radius = 0.7
material = "ClearcoatRed"
translate = [1.88, 0.7, 3.5]

# ── Front row  z = 160 ────────────────────────────────────────────────────────
[[geometry]]
type = "sphere"
radius = 0.7
material = "RoughGold"
translate = [-0.94, 0.7, 1.6]

[[geometry]]
type = "sphere"
radius = 0.7
material = "Copper"
translate = [0.94, 0.7, 1.6]
