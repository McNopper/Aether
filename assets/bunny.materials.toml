# bunny.materials.toml — OpenPBR materials for the Stanford bunny scene.
# Colours are linear Rec.709; renderers convert to the working colour space.

model = "openpbr"
colorspace = "lin_rec709_scene"

# Classic matte white ceramic — showcases the bunny's silhouette and surface detail.
[Bunny]
base_color = [0.900, 0.880, 0.860]
base_weight = 1.0
base_metalness = 0.0
specular_roughness = 0.45
specular_ior = 1.5

# Neutral studio floor.
[Floor]
base_color = [0.350, 0.350, 0.370]
specular_roughness = 0.55
