# OpenPBR fuzz / sheen layer material library — Hyperion demo
# 
# Systematically exercises fuzz_weight, fuzz_roughness, fuzz_color and their
# interaction with the diffuse base — modelling microfibre and fabric surfaces.
# Source: OpenPBR Surface v1.1 specification §5.6 (fuzz lobe).
# Color values are linear Rec.709; Hyperion converts to linear Rec.2020 on load.
# 
# Standard MTL keywords (Kd, Ks, Ka, …) are SILENTLY IGNORED.

colorspace = "lin_rec709"

# ── Row 0: fuzz_weight sweep — dark purple base, off-white fuzz ──────────────
# At weight 0 the sphere is a plain diffuse; at 1.0 the sheen lobe dominates the
# grazing-angle response, giving a characteristically bright rim.

[FuzzWeight_0]
base_color = [0.040, 0.010, 0.120]
specular_roughness = 0.90
fuzz_weight = 0.0

[FuzzWeight_20]
base_color = [0.040, 0.010, 0.120]
specular_roughness = 0.90
fuzz_weight = 0.20
fuzz_color = [0.700, 0.680, 0.660]
fuzz_roughness = 0.50

[FuzzWeight_40]
base_color = [0.040, 0.010, 0.120]
specular_roughness = 0.90
fuzz_weight = 0.40
fuzz_color = [0.700, 0.680, 0.660]
fuzz_roughness = 0.50

[FuzzWeight_70]
base_color = [0.040, 0.010, 0.120]
specular_roughness = 0.90
fuzz_weight = 0.70
fuzz_color = [0.700, 0.680, 0.660]
fuzz_roughness = 0.50

[FuzzWeight_100]
base_color = [0.040, 0.010, 0.120]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.700, 0.680, 0.660]
fuzz_roughness = 0.50

# ── Row 1: fuzz_roughness sweep — cream base, full fuzz weight ───────────────
# Low roughness → sharp, concentrated sheen; high → diffuse, spread halo.

[FuzzRough_10]
base_color = [0.780, 0.780, 0.760]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.780, 0.780, 0.760]
fuzz_roughness = 0.10

[FuzzRough_25]
base_color = [0.780, 0.780, 0.760]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.780, 0.780, 0.760]
fuzz_roughness = 0.25

[FuzzRough_50]
base_color = [0.780, 0.780, 0.760]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.780, 0.780, 0.760]
fuzz_roughness = 0.50

[FuzzRough_75]
base_color = [0.780, 0.780, 0.760]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.780, 0.780, 0.760]
fuzz_roughness = 0.75

[FuzzRough_100]
base_color = [0.780, 0.780, 0.760]
specular_roughness = 0.90
fuzz_weight = 1.0
fuzz_color = [0.780, 0.780, 0.760]
fuzz_roughness = 1.00

# ── Row 2: named fabric archetypes ─────────────────────────────────────────────

# Cotton — warm white, high fuzz, rough fibres; no specular highlight.

[Cotton]
base_color = [0.720, 0.710, 0.680]
specular_roughness = 1.00
fuzz_weight = 0.80
fuzz_color = [0.720, 0.710, 0.680]
fuzz_roughness = 0.80

# Silk — cream, low-weight smooth sheen; slight specular highlight from weave structure.

[Silk]
base_color = [0.820, 0.800, 0.760]
specular_roughness = 0.35
fuzz_weight = 0.35
fuzz_color = [0.900, 0.890, 0.870]
fuzz_roughness = 0.20

# Suede — grey-brown, strong grazing sheen, very rough fibres.

[Suede]
base_color = [0.310, 0.220, 0.160]
specular_roughness = 1.00
fuzz_weight = 0.90
fuzz_color = [0.420, 0.320, 0.240]
fuzz_roughness = 0.90

# Denim — mid blue, coarse weave; moderate fuzz, slight base anisotropy.

[Denim]
base_color = [0.110, 0.190, 0.380]
specular_roughness = 0.80
fuzz_weight = 0.55
fuzz_color = [0.130, 0.210, 0.430]
fuzz_roughness = 0.70

# Velour — deep red, very high fuzz weight and rough fibres (variant of Velvet).

[Velour]
base_color = [0.250, 0.020, 0.030]
specular_roughness = 1.00
fuzz_weight = 1.0
fuzz_color = [0.360, 0.040, 0.050]
fuzz_roughness = 0.65
