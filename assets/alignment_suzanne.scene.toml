# Hyperion/Theia material alignment scene
#
# PURPOSE
# -------
# Side-by-side comparison of Hyperion (path tracer, ground truth) and Theia
# (real-time mesh-shader renderer) for each OpenPBR material layer.
#
# Layout
# ------
#   - Flat diffuse floor (non-reflecting).
#   - Back Suzanne  — simple diffuse reference head, blue-gray.
#   - Front Suzanne — the material under test ("FrontTest" in alignment.materials.toml).
#     Positioned so it PARTIALLY OCCLUDES the back Suzanne from the camera.
#   - No area lights — IBL only (meadow_2_4k.exr).
#
# Workflow
# --------
# 1. Set [FrontTest] in alignment.materials.toml to the desired layer preset
#    (or change the front geometry's `material` to e.g. "FrontSpecular_Glossy").
# 2. Render small first: --width 320 --height 240 for both renderers.
# 3. Diff with the companion diff script; iterate fixes in Theia.
# 4. Confirm at 1024×768 once small renders agree.
#
# Suzanne quaternion [0, 1, 0, 0] = 180° around Y → face points toward −Z (camera).

material_libraries = ["alignment.materials.toml"]

[render]
reference = "presets/alignment_16spp_8bounce.render.toml"

[camera]
reference = "presets/alignment.camera.toml"

[tonemap]
reference = "presets/aces.tonemap.toml"

# ── Floor ─────────────────────────────────────────────────────────────────────
[[geometry]]
type = "box"
half_extents = [8.0, 0.05, 8.0]
material = "Floor"
translate = [0.0, -0.05, 4.0]

# ── Back Suzanne (reference, non-reflecting) ──────────────────────────────────
# translate  +Z = 4.2 (far), +X = 1.2 (right of front head when viewed from camera)
[[geometry]]
type = "instance"
mesh = "suzanne.obj"
material = "BackSuzanne"
translate = [1.2, 1.0, 4.2]
rotate = [0.0, 1.0, 0.0, 0.0]

# ── Front Suzanne (material under test) ──────────────────────────────────────
# translate  +Z = 1.5 (close), X = 0 (left of back head from camera)
# The two heads partially overlap in screen-space; swap material for each test pass.
[[geometry]]
type = "instance"
mesh = "suzanne.obj"
material = "FrontTest"
translate = [0.0, 1.0, 1.5]
rotate = [0.0, 1.0, 0.0, 0.0]
