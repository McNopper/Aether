# OpenPBR thin-film iridescence material library — Hyperion demo
# 
# Systematically exercises thin_film_thickness, thin_film_ior and thin_film_weight.
# Physical basis: thin-film interference (Fabry-Pérot optical path, λ/2 phase shift).
# Thickness range 300–1200 nm produces the visible iridescence colour sweep
# (violet → cyan → green → yellow → orange → red → violet).
# 
# Source: OpenPBR Surface v1.1 specification §5.5 (thin_film lobe).
# Belcour & Barla (SIGGRAPH 2017) "A Practical Extension to Microfacet Theory
# for the Modeling of Varying Iridescence" — colour sweep reference values.
# Color values are linear Rec.709; Hyperion converts to linear Rec.2020 on load.
# 
# Standard MTL keywords (Kd, Ks, Ka, …) are SILENTLY IGNORED.

colorspace = "lin_rec709"

# ── Row 0: thickness sweep on smooth glass base ───────────────────────────────
# Transmission base so the interference colours dominate over base reflectance.
# thin_film_ior = 1.5 (representative of MgF2 or SiO2 coatings).

[TF_Glass_300nm]
transmission_weight = 1.0
specular_ior = 1.50
thin_film_weight = 1.0
thin_film_thickness = 300.0
thin_film_ior = 1.50

[TF_Glass_500nm]
transmission_weight = 1.0
specular_ior = 1.50
thin_film_weight = 1.0
thin_film_thickness = 500.0
thin_film_ior = 1.50

[TF_Glass_700nm]
transmission_weight = 1.0
specular_ior = 1.50
thin_film_weight = 1.0
thin_film_thickness = 700.0
thin_film_ior = 1.50

[TF_Glass_900nm]
transmission_weight = 1.0
specular_ior = 1.50
thin_film_weight = 1.0
thin_film_thickness = 900.0
thin_film_ior = 1.50

[TF_Glass_1100nm]
transmission_weight = 1.0
specular_ior = 1.50
thin_film_weight = 1.0
thin_film_thickness = 1100.0
thin_film_ior = 1.50

# ── Row 1: thickness sweep on mirror-silver metallic base ────────────────────
# Silver base colour reflects all wavelengths equally; the thin-film tints the
# specular F0, producing vivid oil-slick iridescence.

[TF_Metal_300nm]
base_color = [0.972, 0.960, 0.915]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 300.0
thin_film_ior = 1.45

[TF_Metal_500nm]
base_color = [0.972, 0.960, 0.915]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 500.0
thin_film_ior = 1.45

[TF_Metal_700nm]
base_color = [0.972, 0.960, 0.915]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 700.0
thin_film_ior = 1.45

[TF_Metal_900nm]
base_color = [0.972, 0.960, 0.915]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 900.0
thin_film_ior = 1.45

[TF_Metal_1100nm]
base_color = [0.972, 0.960, 0.915]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 1100.0
thin_film_ior = 1.45

# ── Row 2: named iridescent materials ─────────────────────────────────────────

# Oil slick on water — thin hydrocarbon film (n≈1.46, ~400 nm thick).

[OilSlick]
base_color = [0.050, 0.050, 0.050]
transmission_weight = 1.0
specular_ior = 1.33
thin_film_weight = 1.0
thin_film_thickness = 400.0
thin_film_ior = 1.46

# Peacock feather — structural colour via nanostructures (~500 nm pitch,
# approximated as thin film n=1.55).

[PeacockFeather]
base_color = [0.010, 0.060, 0.030]
specular_roughness = 0.40
thin_film_weight = 1.0
thin_film_thickness = 500.0
thin_film_ior = 1.55

# Abalone shell — multi-layer aragonite (~600 nm layers, n≈1.68).

[AbaloneShell]
base_color = [0.800, 0.750, 0.650]
specular_roughness = 0.12
thin_film_weight = 1.0
thin_film_thickness = 600.0
thin_film_ior = 1.68

# Beetle (jewel beetle elytra) — cuticle nanostructure ~800 nm, high-n (~1.7).

[JewelBeetle]
base_color = [0.040, 0.150, 0.020]
base_metalness = 1.0
specular_roughness = 0.08
thin_film_weight = 1.0
thin_film_thickness = 800.0
thin_film_ior = 1.70

# Soap bubble — very thin film (~200–600 nm), air-soap-air, n≈1.35.

[SoapBubbleIrid]
transmission_weight = 1.0
specular_ior = 1.00
thin_film_weight = 1.0
thin_film_thickness = 350.0
thin_film_ior = 1.35
