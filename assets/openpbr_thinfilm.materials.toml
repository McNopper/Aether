# OpenPBR thin-film iridescence material library
#
# Exercises the OpenPBR `thin_film` lobe (thin_film_weight / thin_film_thickness /
# thin_film_ior) via the spec model — MaterialX `mx_fresnel_airy` (Belcour & Barla 2017).
# The thin film sits over the glossy base; for metals the interference uses the true
# conductor phase (complex IOR from base_color + specular_color via Gulbrandsen 2014),
# which is what produces vivid anodized-metal iridescence.
#
# Design: OPAQUE bases so the iridescent reflection IS the appearance (transmission bases
# show the background through them and wash the few-percent colour out). A thin-to-thick
# sweep walks the first-order interference rainbow (violet -> blue -> cyan -> green ->
# yellow -> orange -> magenta). Film IOR 2.0 (TiO2-like) maximises the air-film
# reflectance and thus the interference contrast.
#
# Color values are linear Rec.709.

model = "openpbr"
colorspace = "lin_rec709_scene"

# -- Row 0 + Row 1: anodized-metal thickness sweep on a neutral chromium base --------
# Smooth metal (roughness 0.05); base_color ~0.55 neutral so the film colour reads
# clearly on the reflection. thin_film_ior = 2.0 (TiO2 oxide), the classic anodized stack.

[Anodized_100nm]
base_color = [0.55, 0.56, 0.58]
base_metalness = 1.0
specular_roughness = 0.05
thin_film_weight = 1.0
thin_film_thickness = 100.0
thin_film_ior = 2.00

