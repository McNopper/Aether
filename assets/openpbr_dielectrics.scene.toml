# OpenPBR Dielectrics Showcase — Hyperion demo
# 14 transparent/refractive spheres in 3 rows, lit by IBL panorama.
# Materials from openpbr_dielectrics.materials.toml.

material_libraries = ["openpbr_dielectrics.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_128spp_16bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 2.5, -10.0]
rotate_x = -9.2933
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [12.0, 0.1, 10.0]

[[mesh]]
name = "sphere"
type = "sphere"
radius = 0.7

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.05, 1.0]

# ── Row 0  z = -2.0 ───────────────────────────────────────────────────────────
[[instance]]
mesh = "sphere"
material = "Glass"
translate = [-5.0, 0.7, -2.0]

[[instance]]
mesh = "sphere"
material = "Diamond"
translate = [-2.5, 0.7, -2.0]

[[instance]]
mesh = "sphere"
material = "Water"
translate = [0.0, 0.7, -2.0]

[[instance]]
mesh = "sphere"
material = "Ice"
translate = [2.5, 0.7, -2.0]

[[instance]]
mesh = "sphere"
material = "Sapphire"
translate = [5.0, 0.7, -2.0]

# ── Row 1  z = +0.5 ───────────────────────────────────────────────────────────
[[instance]]
mesh = "sphere"
material = "Quartz"
translate = [-5.0, 0.7, 0.5]

[[instance]]
mesh = "sphere"
material = "HoneyLiquid"
translate = [-2.5, 0.7, 0.5]

[[instance]]
mesh = "sphere"
material = "Salt"
translate = [0.0, 0.7, 0.5]

[[instance]]
mesh = "sphere"
material = "PlasticAcrylic"
translate = [2.5, 0.7, 0.5]

[[instance]]
mesh = "sphere"
material = "PlasticPC"
translate = [5.0, 0.7, 0.5]

# ── Row 2  z = +3.0 ───────────────────────────────────────────────────────────
[[instance]]
mesh = "sphere"
material = "PlasticPET"
translate = [-3.75, 0.7, 3.0]

[[instance]]
mesh = "sphere"
material = "PlasticPVC"
translate = [-1.25, 0.7, 3.0]

[[instance]]
mesh = "sphere"
material = "PlasticPolyurethane"
translate = [1.25, 0.7, 3.0]

[[instance]]
mesh = "sphere"
material = "PlasticPP"
translate = [3.75, 0.7, 3.0]
