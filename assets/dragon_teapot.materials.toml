# dragon_teapot.materials.toml — OpenPBR materials for the combined ceramic + gem IBL scene.
# Colours are linear Rec.709; Hyperion converts them to linear Rec.2020 on load.

model = "openpbr"
colorspace = "lin_rec709_scene"

# Glazed porcelain teapot: dielectric base with a smooth clear-coat glaze.

[Ceramic]
base_color = [0.820, 0.795, 0.760]
base_weight = 1.0
base_metalness = 0.0
specular_roughness = 0.08
specular_ior = 1.5
coat_weight = 1.0
coat_roughness = 0.04
coat_ior = 1.5

# Gem dragon: clear dielectric with volumetric (Beer-Lambert) emerald absorption.

[Gem]
base_color = [1.000, 1.000, 1.000]
transmission_weight = 1.0
transmission_color = [0.300, 0.900, 0.600]
transmission_depth = 0.35
specular_ior = 1.8
specular_roughness = 0.0

# Neutral studio floor.

[Floor]
base_color = [0.350, 0.350, 0.370]
specular_roughness = 0.55
