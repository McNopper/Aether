# shaderball_emission.scene — OpenPBR emission layer showcase.
# 5 shader_ball instances in a single row, lit by the meadow IBL panorama.
# Tests emission_luminance on a fixed warm-white emission colour.
# Materials from shaderball_emission.materials.toml.

material_libraries = ["shaderball_emission.materials.toml", "floor.materials.toml"]

[render]
reference = "presets/meadow_64spp_8bounce.render.toml"

[camera]
reference = "presets/openpbr_studio_wide.camera.toml"
translate = [0.0, 9.5, -17.5]
rotate_x = -16.0000
rotate_y = 180.0000

# Ground plane

# ── Meshes (declared once; object space) ──────────────────────────────────────

[[mesh]]
name = "box"
type = "box"
half_extents = [14.0, 0.1, 10.0]

[[mesh]]
name = "shader_ball"
path = "shader_ball.obj"

# ── Instances (place a mesh with a transform + material) ──────────────────────

[[instance]]
mesh = "box"
material = "NeutralFloor"
translate = [0.0, -0.1, 2.5]

# ── Row 0  z = 0.0  emission_luminance sweep ─────────────────────────────────
[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "EmitLum_200000", "BallInner" = "NeutralBall", "BallSurface" = "EmitLum_200000" }
translate = [-10.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "EmitLum_50000", "BallInner" = "NeutralBall", "BallSurface" = "EmitLum_50000" }
translate = [-5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "EmitLum_10000", "BallInner" = "NeutralBall", "BallSurface" = "EmitLum_10000" }
translate = [0.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "EmitLum_1000", "BallInner" = "NeutralBall", "BallSurface" = "EmitLum_1000" }
translate = [5.0, -0.021, 0.095]
rotate_y = 180.0

[[instance]]
mesh = "shader_ball"
materials = { "BaseTop" = "NeutralTop", "BaseStem" = "NeutralStem", "BaseFoot" = "EmitLum_0", "BallInner" = "NeutralBall", "BallSurface" = "EmitLum_0" }
translate = [10.0, -0.021, 0.095]
rotate_y = 180.0
