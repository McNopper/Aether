# Fixture: Transparency Plane Analytic Coverage — material library
#
# Emission-only materials so coverage compositing can be checked without BRDF,
# direct lighting, or IBL variance.

model = "openpbr"
colorspace = "lin_rec709_scene"

[CoveragePlane]
base_color = [0.0, 0.0, 0.0]
specular_weight = 0.0
geometry_opacity = 0.5
emission_color = [0.050, 0.250, 0.900]
emission_luminance = 2000.0
emission_as_light_source = false

[EmissiveRed]
base_color = [0.0, 0.0, 0.0]
specular_weight = 0.0
emission_color = [1.000, 0.150, 0.050]
emission_luminance = 2000.0
emission_as_light_source = false
