# shader_ball.materials.toml — the ShaderBall as a single-material preview.
#
# Standard shader-ball convention: the hero material is shown on the ball surface
# AND the outer rim (BallSurface + BaseFoot); the remaining zones (BallInner cut,
# BaseTop collar, BaseStem) are neutral grey so they don't compete with it.
# Swap the two hero tables to preview any OpenPBR material. All five zones remain
# independently assignable via the scene's `materials` map.
# Colours are linear Rec.709; renderers convert to the working colour space.

model = "openpbr"
colorspace = "lin_rec709_scene"

# ── Hero material — ball surface + outer rim ─────────────────────────────────

[BallSurface]
base_color = [0.720, 0.040, 0.020]
specular_roughness = 0.55
coat_weight = 1.0
coat_roughness = 0.04
coat_ior = 1.5

[BaseFoot]
base_color = [0.720, 0.040, 0.020]
specular_roughness = 0.55
coat_weight = 1.0
coat_roughness = 0.04
coat_ior = 1.5

# ── Neutral zones ────────────────────────────────────────────────────────────

[BallInner]
base_color = [0.600, 0.600, 0.600]
specular_roughness = 0.60

[BaseTop]
base_color = [0.520, 0.520, 0.520]
specular_roughness = 0.60

[BaseStem]
base_color = [0.440, 0.440, 0.450]
specular_roughness = 0.60
